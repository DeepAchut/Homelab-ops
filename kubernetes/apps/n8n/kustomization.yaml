apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: n8n
resources:
  - namespace.yaml
  - rbac.yaml
  - secret.enc.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  # PostgreSQL backend (migrated off SQLite-on-NFS — see MIGRATION-sqlite-to-postgres.md)
  - postgres/secret.enc.yaml
  - postgres/pvc.yaml
  - postgres/service.yaml
  - postgres/statefulset.yaml
