apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      serviceAccountName: n8n
      nodeSelector:
        tier: always-on
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5678
              name: http
            - containerPort: 5679
              name: broker
          env:
            - name: N8N_HOST
              value: "n8n.dkghar.duckdns.org"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_EDITOR_BASE_URL
              value: "https://n8n.dkghar.duckdns.org"
            - name: WEBHOOK_URL
              value: "https://n8n.dkghar.duckdns.org"
            - name: GENERIC_TIMEZONE
              value: "America/Chicago"
            - name: TZ
              value: "America/Chicago"
            - name: N8N_SECURE_COOKIE
              value: "false"
            - name: N8N_REINSTALL_MISSING_PACKAGES
              value: "true"
            # Kill Rudder telemetry + version check (was spamming axios ECONNREFUSED to 0.0.0.0:443)
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
            - name: EXTERNAL_FRONTEND_HOOKS_URLS
              value: ""
            - name: N8N_DIAGNOSTICS_CONFIG_FRONTEND
              value: ""
            - name: N8N_DIAGNOSTICS_CONFIG_BACKEND
              value: ""
            # External Python runner wiring (matches old compose)
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_RUNNERS_MODE
              value: "external"
            - name: N8N_RUNNERS_BROKER_LISTEN_ADDRESS
              value: "0.0.0.0"
            - name: N8N_RUNNERS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_RUNNERS_AUTH_TOKEN
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
            # ─── PostgreSQL backend (migrated off SQLite-on-NFS) ───────────
            # SQLite on the DAS-backed NFS corrupted during a USB flap. n8n now
            # uses Postgres on local-path storage. The SAME N8N_ENCRYPTION_KEY
            # (above) must be kept so imported credentials still decrypt.
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              value: "n8n-postgres"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_USER
              value: "n8n"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-postgres-creds
                  key: POSTGRES_PASSWORD
            - name: UPSNAP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: UPSNAP_USERNAME
            - name: UPSNAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: UPSNAP_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /home/node/.n8n
            - name: data
              mountPath: /home/data
            - name: k8s-token
              mountPath: /var/run/secrets/n8n-k8s
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 1500m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 30

        # External Python task runner (sidecar — shares localhost with n8n)
        - name: n8n-runners
          image: n8nio/runners:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: N8N_RUNNERS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_RUNNERS_AUTH_TOKEN
            - name: N8N_RUNNERS_TASK_BROKER_URI
              value: "http://localhost:5679"
            - name: N8N_RUNNERS_EXTERNAL_ALLOW
              value: "*"
            - name: N8N_RUNNERS_STDLIB_ALLOW
              value: "*"
          volumeMounts:
            - name: config
              mountPath: /etc/n8n-task-runners.json
              subPath: runner-config.json
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: n8n-config-local
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data-local
        - name: k8s-token
          secret:
            secretName: n8n-k8s-token
