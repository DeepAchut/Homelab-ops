apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: portfolio
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

# The site HTML + headshot are committed in site/ and bundled into the ConfigMap
# (hash-suffixed name -> editing either file auto-rolls the pod), so the image is
# served from the cluster.
#
# NOTE: Flux's source-controller strips *.jpg/*.png from its source artifact by
# default, which would make this build fail with "profile.jpg: no such file".
# The repo-root .sourceignore re-includes it via a negation rule — keep that file.
configMapGenerator:
  - name: portfolio-site
    files:
      - site/index.html
      - site/profile.jpg
