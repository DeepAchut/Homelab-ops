# Static portfolio site. The HTML is delivered as a ConfigMap (configMapGenerator
# in kustomization.yaml from site/index.html) mounted into nginx's web root.
# nginx-unprivileged runs as non-root on :8080 — clean under PodSecurity.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio
  labels: { app: portfolio }
spec:
  replicas: 1
  selector:
    matchLabels: { app: portfolio }
  template:
    metadata:
      labels: { app: portfolio }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - { containerPort: 8080, name: http }
          volumeMounts:
            - { name: site, mountPath: /usr/share/nginx/html, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "200m", memory: "64Mi" }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: site
          configMap:
            name: portfolio-site
