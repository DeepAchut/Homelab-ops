apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux-db
  namespace: miniflux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miniflux-db
  template:
    metadata:
      labels:
        app: miniflux-db
    spec:
      nodeSelector:
        tier: always-on
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: miniflux
            - name: POSTGRES_DB
              value: miniflux
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: miniflux-db
---
apiVersion: v1
kind: Service
metadata:
  name: miniflux-db
  namespace: miniflux
spec:
  selector:
    app: miniflux-db
  ports:
    - port: 5432
      targetPort: 5432