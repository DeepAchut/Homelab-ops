# Helper scripts + context files mounted at /opt/opencode-helpers/.
#
# The init container copies these to:
#   /usr/local/bin/mem0       ← mem0 CLI wrapper (curl mem0's REST API)
#   /usr/local/bin/clone-repo ← git clone helper into /workspace
#   /opt/opencode-helpers/HOMELAB_CONTEXT.md ← always-loaded session context
#
# All are read-only — to change them, edit this configmap + flux reconcile
# (rollout will re-seed). This matches the pattern used by hermes-agent's
# skill scripts (configmap → init container → /opt/data).
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-helpers
  namespace: opencode
data:
  # ─── mem0 CLI wrapper ──────────────────────────────────────────────────────
  # Usage from inside the OpenCode shell:
  #   mem0 search "homelab architecture preferences"
  #   mem0 add "Decided to use OpenCode + Claude Code combo per Phase 26"
  #   mem0 list
  # Defaults user_id=deep — pass --user family to query the family namespace.
  mem0: |
    #!/usr/bin/env bash
    # mem0 CLI wrapper — talks to the mem0 REST API for OpenCode sessions.
    # User ID defaults to "deep". Override with --user <id> as the first arg.
    set -euo pipefail
    MEM0_URL="${MEM0_URL:-http://192.168.4.141:30800}"
    USER_ID="${MEM0_USER_ID:-deep}"

    # Parse --user <id> first so it can come before the subcommand
    if [[ "${1:-}" == "--user" ]]; then
      USER_ID="$2"
      shift 2
    fi

    cmd="${1:-help}"
    shift || true

    case "$cmd" in
      search)
        query="${*:-}"
        if [[ -z "$query" ]]; then
          echo "usage: mem0 search <query>" >&2; exit 2
        fi
        curl -fsSL -X POST "$MEM0_URL/v1/memories/search" \
          -H "Content-Type: application/json" \
          -d "$(jq -nc --arg q "$query" --arg u "$USER_ID" \
               '{query:$q, user_id:$u, limit:10}')"
        echo
        ;;
      add)
        content="${*:-}"
        if [[ -z "$content" ]]; then
          echo "usage: mem0 add <content>" >&2; exit 2
        fi
        curl -fsSL -X POST "$MEM0_URL/v1/memories" \
          -H "Content-Type: application/json" \
          -d "$(jq -nc --arg c "$content" --arg u "$USER_ID" \
               '{messages:[{role:"user",content:$c}], user_id:$u}')"
        echo
        ;;
      list)
        curl -fsSL "$MEM0_URL/v1/memories?user_id=$USER_ID"
        echo
        ;;
      help|--help|-h|"")
        cat <<EOF
    mem0 — REST wrapper for the homelab mem0 server.

    USAGE
      mem0 [--user <id>] <command> [args]

    COMMANDS
      search <query>   Semantic search across stored memories
      add <content>    Add a new memory fact
      list             List all memories for this user
      help             Show this help

    DEFAULTS
      MEM0_URL=$MEM0_URL
      USER_ID=$USER_ID

    EXAMPLES
      mem0 search "homelab architecture preferences"
      mem0 add "Phase 26 deployed OpenCode on Evo-X2 with 4 providers"
      mem0 --user family search "preferences"
    EOF
        ;;
      *)
        echo "mem0: unknown command '$cmd' — try 'mem0 help'" >&2
        exit 2
        ;;
    esac

  # ─── clone-repo helper ─────────────────────────────────────────────────────
  # Clones a GitHub repo into /workspace and changes into the dir.
  # Reminder: this is the standard workflow — the pod IS the dev environment.
  # Windows files are not reachable; clone the repo here, edit + commit + push
  # from here.
  #
  # Usage:
  #   clone-repo DeepAchut/Homelab-ops
  #   clone-repo https://github.com/owner/repo.git some-target-dir
  clone-repo: |
    #!/usr/bin/env bash
    # clone-repo — clone a GitHub repo into /workspace/<name> and cd there.
    set -euo pipefail

    if [[ $# -eq 0 || "${1:-}" == "--help" || "${1:-}" == "-h" ]]; then
      cat <<'EOF'
    clone-repo — clone a repo into /workspace/<name> for use with OpenCode.

    USAGE
      clone-repo <owner/repo> [target-dir]
      clone-repo <full-url>   [target-dir]

    EXAMPLES
      clone-repo DeepAchut/Homelab-ops
      clone-repo https://github.com/sst/opencode.git opencode

    NOTES
      - The pod's filesystem IS your dev environment. Edit/commit/push from here.
      - Public repos clone unauthenticated. Private repos: configure a PAT first
        via `gh auth login`, or set GITHUB_TOKEN and use https-with-token URLs.
      - To bring a file in from your Windows host: from the Windows side, run
          kubectl -n opencode cp <local-path> <pod>:/workspace/<dest>
    EOF
      exit 0
    fi

    SRC="$1"
    TARGET="${2:-}"

    # Normalize owner/repo → https URL
    if [[ "$SRC" =~ ^[^/]+/[^/]+$ ]]; then
      URL="https://github.com/${SRC}.git"
      DEFAULT_NAME="${SRC##*/}"
    else
      URL="$SRC"
      # strip .git + trailing slash for the default dir name
      DEFAULT_NAME=$(basename "$URL" .git)
    fi

    TARGET="${TARGET:-$DEFAULT_NAME}"
    DEST="/workspace/${TARGET}"

    if [[ -d "$DEST/.git" ]]; then
      echo "clone-repo: $DEST already exists; cd into it"
    else
      echo "clone-repo: cloning $URL → $DEST"
      git clone "$URL" "$DEST"
    fi

    cd "$DEST"
    echo "clone-repo: now in $(pwd)"
    exec "${SHELL:-bash}"

  # ─── Session context loaded automatically ─────────────────────────────────
  # Referenced from opencode.json's "instructions" array. OpenCode reads this
  # at session start and feeds it to the model as system context. Keep it tight
  # so the prompt-token bill stays low; deep details belong in mem0.
  HOMELAB_CONTEXT.md: |
    # Homelab Operations Context — OpenCode session header

    You are running inside the homelab cluster on `ira-evo-x2-talos-worker`
    (Strix Halo, AMD Ryzen AI Max 395, Radeon 8060S iGPU, 96 GB UMA).

    ## User
    - **Deep** — homelab builder. Repo: DeepAchut/Homelab-ops (public).
    - Manages everything remotely from Windows 11.
    - Style: GitOps-first, SOPS+Age for secrets, "minimum tools that meet the goal".
    - Commits MANUALLY — never auto-commit unless explicitly asked.

    ## Available providers in this OpenCode instance
    | Provider        | When to pick                                          |
    |-----------------|-------------------------------------------------------|
    | `google`        | Hard tasks via Gemini 2.5 Pro / daily-driver via Flash (free-tier API) |
    | `ollama-evox2`  | Local-only / no-egress / multimodal (gemma4) / coding (qwen3.6) |
    | `hermes-admin`  | Need homelab admin skills (ssh_exec, k8s_status, etc.) |
    | `hermes-family` | Family-safe chat (no admin tools, isolated mem0)      |

    For Anthropic models (Claude Opus / Sonnet / Haiku), switch to Claude Code
    on the laptop — Anthropic API is pay-per-token with no free tier, so we
    deliberately don't run it from this pod.

    ## Live infra endpoints (all reachable from this pod)
    - **mem0** memory: `http://192.168.4.141:30800` — call via the `mem0` CLI
    - **Ollama** (Evo-X2 host): `http://192.168.4.84:11434`
    - **Ollama** (Peladn LXC): `http://192.168.4.12:11434`
    - **Grafana** (CT405): `http://192.168.4.66:3000`
    - **Loki** (CT405): `http://192.168.4.66:3100`
    - **Gotify**: `http://192.168.4.13:8800`

    ## Live system guardrails — ALWAYS CONFIRM before:
    - `kubectl delete` in mem0 / flux-system / kube-system / n8n / hermes-* / opencode
    - Deleting any PVC or PV
    - `git push --force` / `git push -f`
    - Deleting or overwriting SOPS-encrypted secrets
    - Destructive DB ops (DROP, TRUNCATE, DELETE all)

    ## Workspace — the pod IS the dev environment

    Your filesystem here is independent of the Windows admin box. The user's
    Windows files are NOT reachable from inside the pod. The workflow is
    git-mediated:

    1. Clone the repo you want to edit INTO the pod with `clone-repo owner/repo`
       (or it may already be there — `/workspace/Homelab-ops` is auto-cloned
       on first boot).
    2. Edit / build / commit inside the pod.
    3. Push back to GitHub from inside the pod. For push auth, the user runs
       `gh auth login` once or sets `GITHUB_TOKEN` in the shell — don't try to
       use the host's git credentials.
    4. If a single file needs to come in from the Windows host, the user runs
       (from the Windows side, NOT from in here):
          `kubectl -n opencode cp <local-path> <pod>:/workspace/<dest>`

    Layout:
    - `/workspace/Homelab-ops` — primary working tree (auto-cloned on boot)
    - `/workspace/<other-repo>` — anything else cloned via `clone-repo`
    - `/workspace/scratch` — throwaway experiments
    - mem0 — persistent layer that survives across sessions and across pod restarts
