apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app: hermes-agent
spec:
  # Persistent process (WhatsApp websocket, memory store, skill runtime) — DO NOT scale beyond 1.
  # PVC is RWO; second replica would block-mount-fail anyway.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: hermes-agent }
  template:
    metadata:
      labels: { app: hermes-agent }
    spec:
      serviceAccountName: hermes-agent
      # Pin to the new Evo-X2 worker. Existing rpi4 apps stay put (none match this label).
      nodeSelector:
        tier: ai-worker

      initContainers:
        # Seed /opt/data on first run + sync the system-administrator skill each rollout.
        # Idempotent: doesn't overwrite config.yaml after Hermes has touched it.
        - name: seed
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              echo "→ seeding /opt/data"
              mkdir -p /opt/data/skills/system-administrator/scripts
              mkdir -p /opt/data/skills/system-administrator/references

              # Config: always overwrite so GitOps edits propagate on rollout.
              # Trade-off: Hermes' own runtime mutations (/model switches) are lost on rollout.
              # If you want to preserve runtime state, edit this configmap + apply (it'll re-seed
              # the new values), or accept manual edits to /opt/data/config.yaml inside the pod.
              cp /seed-config/config.yaml /opt/data/config.yaml
              echo "  config.yaml synced"

              # Skill: always sync (so manifest changes propagate on rollout)
              cp /seed-skill/SKILL.md /opt/data/skills/system-administrator/SKILL.md
              for s in /seed-skill-scripts/*.py; do
                cp "$s" /opt/data/skills/system-administrator/scripts/
              done
              chmod +x /opt/data/skills/system-administrator/scripts/*.py
              echo "  system-administrator skill synced"

              # SSH key for admin v2 (ssh_run / ssh_exec):
              # Hermes drops to UID 10000 at runtime, so the Secret-mounted
              # key at /etc/hermes-ssh/id_ed25519 (root-owned 0400) is unreadable.
              # Copy it to the PVC, chmod 0400, chown to the runtime UID.
              if [ -f /etc/hermes-ssh/id_ed25519 ]; then
                mkdir -p /opt/data/.ssh
                cp /etc/hermes-ssh/id_ed25519 /opt/data/.ssh/id_ed25519
                chmod 0700 /opt/data/.ssh
                chmod 0400 /opt/data/.ssh/id_ed25519
                chown -R 10000:10000 /opt/data/.ssh
                touch /opt/data/.ssh/known_hosts
                chown 10000:10000 /opt/data/.ssh/known_hosts
                chmod 0600 /opt/data/.ssh/known_hosts
                echo "  ssh key staged at /opt/data/.ssh/id_ed25519 (UID 10000)"
              else
                echo "  ssh key not present in Secret (admin v2 SSH tools will fail until SSH_PRIVATE_KEY is set)"
              fi

              # Permissions: Hermes runs as root initially, drops to UID 10000.
              # PVC contents must be readable by 10000 — fsGroup or explicit chowns handle this.
              ls -la /opt/data
          volumeMounts:
            - { name: data,                mountPath: /opt/data }
            - { name: seed-config,         mountPath: /seed-config }
            - { name: seed-skill,          mountPath: /seed-skill }
            - { name: seed-skill-scripts,  mountPath: /seed-skill-scripts }
            - { name: hermes-ssh,          mountPath: /etc/hermes-ssh, readOnly: true }

      containers:
        # ───────────────────────────────────────────────────────────────────
        # Hermes Agent gateway — single container, OpenAI-compatible API
        # exposed on :8642 for Open WebUI / other clients to connect to.
        # No messaging-platform sidecars; Open WebUI is the user-facing front-end.
        # ───────────────────────────────────────────────────────────────────
        - name: hermes
          image: nousresearch/hermes-agent:v2026.6.5
          imagePullPolicy: IfNotPresent
          # `gateway run` = headless server mode (no TTY needed). Default entrypoint
          # is the interactive CLI which exits on `fd=0 is not a terminal`.
          args: ["gateway", "run"]
          ports:
            - { name: api,    containerPort: 8642, protocol: TCP }   # OpenAI-compat + health
          env:
            # Put the venv first on PATH so `kubectl exec -- hermes ...` resolves without full path.
            # The container's entrypoint also activates this venv for the main process, but `exec`
            # sessions skip the entrypoint.
            - { name: PATH, value: "/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" }

            # Hermes OpenAI-compatible HTTP API server on :8642 — this is what Open WebUI talks to.
            # Required: API_SERVER_KEY (8+ chars) since we bind 0.0.0.0 (so the K8s Service can reach it).
            - { name: API_SERVER_ENABLED, value: "true" }
            - { name: API_SERVER_HOST,    value: "0.0.0.0" }
            - { name: API_SERVER_KEY,     valueFrom: { secretKeyRef: { name: hermes-credentials, key: API_SERVER_KEY, optional: false } } }

            # Beszel server — system-administrator skill's beszel_query.py uses these.
            # In-cluster service DNS is the cleanest endpoint (no NodePort hop).
            - name: BESZEL_URL
              value: "http://beszel.beszel.svc.cluster.local:8090"
            - name: BESZEL_USER
              valueFrom: { secretKeyRef: { name: hermes-credentials, key: BESZEL_USER,     optional: true } }
            - name: BESZEL_PASSWORD
              valueFrom: { secretKeyRef: { name: hermes-credentials, key: BESZEL_PASSWORD, optional: true } }

            # Grafana — system-administrator skill's grafana_query.py uses these.
            # Grafana lives on CT405 (LXC, not in K8s) so we use the LAN IP.
            - name: GRAFANA_URL
              value: "http://192.168.4.66:3000"
            - name: GRAFANA_TOKEN
              valueFrom: { secretKeyRef: { name: hermes-credentials, key: GRAFANA_TOKEN, optional: true } }

            # SearXNG — searxng_query.py uses this as the primary web-search backend.
            # No token needed (internal-only metasearch).
            - name: SEARXNG_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"

            # Gotify push notification target for ssh_exec.py audit (best-effort).
            # If GOTIFY_TOKEN is not set, no notifications are sent (gracefully degrades).
            # Create a dedicated Gotify app for Hermes (Apps → Create app → "Hermes ssh_exec")
            # and put its token in the Secret. URL is the LAN address (no NPM SSL roundtrip
            # to keep latency low and avoid cert-trust issues from inside the pod).
            - name: GOTIFY_URL
              value: "http://192.168.4.13:8800"
            - name: GOTIFY_TOKEN
              valueFrom: { secretKeyRef: { name: hermes-credentials, key: GOTIFY_TOKEN, optional: true } }

            # NAT64/dual-stack: Talos K8s networking resolves external IPv4 as
            # 64:ff9b::/96-mapped IPv6, which Hermes's tools.url_safety flags as
            # "private/internal" — false positive that blocks web_extract.
            # Safe to disable here: single-user homelab, no IMDS exposure, and
            # Hermes is already authorized to call internal services per SKILL.md.
            - name: HERMES_ALLOW_PRIVATE_URLS
              value: "true"

            # Loki target for ssh_exec audit push (CT405). Container stdout is
            # already shipped by the Alloy DaemonSet; this is for the file-based
            # audit log specifically.
            - name: LOKI_URL
              value: "http://192.168.4.66:3100"
            # Credentials — sourced from the hermes-credentials Secret (SOPS-encrypted in repo)
            - { name: ANTHROPIC_API_KEY,    valueFrom: { secretKeyRef: { name: hermes-credentials, key: ANTHROPIC_API_KEY,    optional: true } } }
            - { name: GEMINI_API_KEY,       valueFrom: { secretKeyRef: { name: hermes-credentials, key: GEMINI_API_KEY,       optional: true } } }
            - { name: HASS_TOKEN,           valueFrom: { secretKeyRef: { name: hermes-credentials, key: HASS_TOKEN,           optional: true } } }
            - { name: HASS_URL,             value: "http://192.168.4.13:8123" }
            - { name: PROXMOX_TOKEN_ID,     valueFrom: { secretKeyRef: { name: hermes-credentials, key: PROXMOX_TOKEN_ID,     optional: true } } }
            - { name: PROXMOX_TOKEN_VALUE,  valueFrom: { secretKeyRef: { name: hermes-credentials, key: PROXMOX_TOKEN_VALUE,  optional: true } } }
            - { name: PBS_TOKEN_ID,         valueFrom: { secretKeyRef: { name: hermes-credentials, key: PBS_TOKEN_ID,         optional: true } } }
            - { name: PBS_TOKEN_VALUE,      valueFrom: { secretKeyRef: { name: hermes-credentials, key: PBS_TOKEN_VALUE,      optional: true } } }
            # Hermes expects its data root at /opt/data per the official image
            - { name: HERMES_HOME,          value: "/opt/data" }
          volumeMounts:
            - { name: data, mountPath: /opt/data }
            # SSH key for admin v2 is staged by the init container at
            # /opt/data/.ssh/id_ed25519 (UID 10000-owned, mode 0400). The
            # main container reads from there, not directly from the Secret.
          resources:
            requests: { cpu: "200m",  memory: "1Gi"  }
            limits:   { cpu: "2000m", memory: "4Gi"  }
          # Exec probes (not HTTP) — the gateway only opens :8642 when API_SERVER_ENABLED=true,
          # which we leave off until the user provides API_SERVER_KEY. Process check is
          # enough: if the gateway python process is gone, the container is sick.
          # When you enable API_SERVER, swap these for httpGet /health.
          readinessProbe:
            exec: { command: ["pgrep", "-f", "hermes gateway run"] }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec: { command: ["pgrep", "-f", "hermes gateway run"] }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

      # Stay alive on quiet evenings — WhatsApp session needs persistence
      terminationGracePeriodSeconds: 30

      volumes:
        - name: data
          persistentVolumeClaim: { claimName: hermes-data }
        - name: seed-config
          configMap: { name: hermes-config-seed }
        - name: seed-skill
          secret: { secretName: hermes-skill-system-administrator }
        - name: seed-skill-scripts
          configMap: { name: hermes-skill-system-administrator-scripts, defaultMode: 0755 }
        # SSH private key for admin v2 skills (ssh_run, ssh_exec)
        # Sourced from hermes-credentials Secret key SSH_PRIVATE_KEY.
        - name: hermes-ssh
          secret:
            secretName: hermes-credentials
            items:
              - key: SSH_PRIVATE_KEY
                path: id_ed25519
            defaultMode: 0400
