# PLAINTEXT TEMPLATE — committed to repo for documentation.
# Copy to secret.yaml (or secrets.yaml) and fill in real values, then encrypt with SOPS+Age
# before committing the encrypted form.
#
# Encryption:
#   cd Homelab-ops
#   cp kubernetes/apps/hermes-agent/secret.example.yaml \
#      kubernetes/apps/hermes-agent/secret.enc.yaml
#   # edit secret.enc.yaml to fill in real values
#   sops --encrypt --in-place kubernetes/apps/hermes-agent/secret.enc.yaml
#
# Hermes reads these from env. None are strictly required for the pod to boot
# (everything is optional=true except API_SERVER_KEY). Fill what you have:

apiVersion: v1
kind: Secret
metadata:
  name: hermes-credentials
  namespace: hermes-agent
type: Opaque
stringData:
  # ─── Hermes' own HTTP API server ───────────────────────────────────────────
  # Required (Hermes refuses to bind 0.0.0.0 without a key). 8+ chars; we use 64-hex.
  # Generate: openssl rand -hex 32
  # Open WebUI uses this same value as its OPENAI_API_KEY to call Hermes.
  API_SERVER_KEY: ""

  # ─── Fallback LLM providers ────────────────────────────────────────────────
  # Anthropic API key (paid) — Hermes fallback chain final step on local Ollama errors.
  ANTHROPIC_API_KEY: ""

  # Google Gemini API key — Hermes fallback chain first step (free tier, fast).
  # Create at aistudio.google.com → Get API Key.
  GEMINI_API_KEY: ""

  # ─── Home Assistant ────────────────────────────────────────────────────────
  # Long-lived access token — enables the 4 ha_* tools.
  # Create at HA → Profile → Security → Long-Lived Access Tokens.
  HASS_TOKEN: ""

  # ─── Proxmox VE (read-only for the proxmox_status.py skill script) ─────────
  # Create at Datacenter → Permissions → API Tokens → root@pam → Add
  #   token name: hermes-readonly   permissions: PVEAuditor on path /
  PROXMOX_TOKEN_ID: "root@pam!hermes-readonly"
  PROXMOX_TOKEN_VALUE: ""

  # ─── PBS (optional, separate token needed for PBS API audit role) ──────────
  PBS_TOKEN_ID: "root@pam!hermes-readonly"
  PBS_TOKEN_VALUE: ""

  # ─── Beszel server API (system-administrator skill: beszel_query.py) ───────
  # Recommended: create a dedicated user via Beszel UI → Settings → Users → Add
  #   name: hermes-reader   role: User (read-only)
  # Don't reuse your admin account — least privilege.
  BESZEL_USER: ""
  BESZEL_PASSWORD: ""

  # ─── Grafana service-account token (grafana_query.py skill script) ─────────
  # Create at Grafana UI → Administration → Users and access → Service accounts → Add
  #   name: hermes-reader   role: Viewer   → Add token → copy
  # Read-only access lets the script list dashboards / read alerts / fetch annotations.
  GRAFANA_TOKEN: ""
