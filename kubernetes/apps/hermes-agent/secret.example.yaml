# PLAINTEXT TEMPLATE — copy to secret.enc.yaml and encrypt with SOPS+Age before committing.
#
# Encryption:
#   sops --encrypt --input-type yaml --output-type yaml \
#     --age $(bw get notes 'SOPS Age Key' | grep public | awk '{print $NF}') \
#     secret.plain.yaml > secret.enc.yaml
#
# Hermes reads these from env. None are required to bring the pod up — Hermes runs
# in "local Ollama only" mode if everything is empty. Fill in what you have:
apiVersion: v1
kind: Secret
metadata:
  name: hermes-credentials
  namespace: hermes-agent
type: Opaque
stringData:
  # Anthropic API key (paid) — used by Hermes fallback chain when local Ollama errors.
  # Create at: console.anthropic.com → API Keys → Create Key.
  # Optional. If empty, fallback skips Anthropic.
  ANTHROPIC_API_KEY: ""

  # Google Gemini API key — used by Hermes fallback chain (cheap path).
  # Create at: aistudio.google.com → Get API Key.
  # Optional. If empty, fallback skips Gemini.
  GEMINI_API_KEY: ""

  # Home Assistant long-lived access token — enables the 4 HA tools
  # (ha_list_entities, ha_get_state, ha_list_services, ha_call_service).
  # Create at: HA → Profile → Security → Long-Lived Access Tokens → Create.
  # Optional but recommended — without this, Hermes can't control devices.
  HASS_TOKEN: ""

  # Proxmox VE API token VALUE (not the full id@realm!token=value form, just the secret).
  # Create at: Datacenter → API Tokens → root@pam → Add → name=hermes-readonly
  #   permissions: Datacenter (path: /) with role PVEAuditor (read-only)
  # Used by the system-administrator skill to monitor VMs/LXCs on Peladn + Evo-X2.
  # Optional.
  PROXMOX_TOKEN_ID: "root@pam!hermes-readonly"
  PROXMOX_TOKEN_VALUE: ""

  # PBS API token VALUE — existing root@pam!n8n-das-backup token has DatastoreBackup,
  # NOT enough for PBS read. Either create a new token with Audit role or skip PBS monitoring.
  PBS_TOKEN_ID: "root@pam!hermes-readonly"
  PBS_TOKEN_VALUE: ""
