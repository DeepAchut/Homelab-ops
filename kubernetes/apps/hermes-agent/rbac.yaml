---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-agent
  namespace: hermes-agent
---
# Read-only across the cluster — Hermes can answer "what pods are running" /
# "what's the state of mem0" without ever mutating anything.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hermes-agent-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - nodes
      - namespaces
      - events
      - configmaps
      - persistentvolumeclaims
      - persistentvolumes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-agent-reader
subjects:
  - kind: ServiceAccount
    name: hermes-agent
    namespace: hermes-agent
roleRef:
  kind: ClusterRole
  name: hermes-agent-reader
  apiGroup: rbac.authorization.k8s.io
