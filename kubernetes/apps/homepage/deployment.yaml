apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      nodeSelector:
        kubernetes.io/hostname: ira-rpi4-talos-worker
      # The configMap is read-only; homepage needs a writable /app/config (it
      # creates logs/, icons/, and default config files at runtime). Seed an
      # emptyDir from the configMap, then run homepage against the emptyDir.
      initContainers:
        - name: copy-config
          image: ghcr.io/gethomepage/homepage:latest
          command: ["sh", "-c", "cp -f /config-src/*.yaml /app/config/"]
          volumeMounts:
            - { name: config-src, mountPath: /config-src }
            - { name: config, mountPath: /app/config }
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: TZ
              value: America/Chicago
            # homepage v1.x rejects requests whose Host header isn't allowlisted.
            # NodePort 30000 on the rpi4 worker; add extra hosts/domains here.
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.4.141:30000,ira-rpi4-talos-worker:30000,localhost:3000"
          volumeMounts:
            - { name: config, mountPath: /app/config }
      volumes:
        - name: config-src
          configMap:
            name: homepage-config
        - name: config
          emptyDir: {}
