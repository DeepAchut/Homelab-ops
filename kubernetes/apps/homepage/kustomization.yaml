apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: homepage
namespace: homepage
resources:
  - namespace.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml

# Config is generated (not a static ConfigMap) so kustomize appends a content
# hash to the name. Any edit under config/ -> new hash -> new ConfigMap name ->
# the deployment's volume reference is rewritten -> the pod rolls automatically.
# Without this, a statically-named ConfigMap updates in place and the running
# pod keeps serving the copy its initContainer made at startup (stale dashboard
# until a manual `rollout restart`).
configMapGenerator:
  - name: homepage-config
    files:
      - config/settings.yaml
      - config/kubernetes.yaml
      - config/services.yaml
      - config/widgets.yaml
