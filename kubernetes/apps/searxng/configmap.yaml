apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: searxng
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "deep's homelab search"
      privacypolicy_url: false
      donation_url: false
      contact_url: false
      enable_metrics: false
    server:
      base_url: https://searxng.dkghar.duckdns.org/
      port: 8080
      bind_address: "0.0.0.0"
      secret_key: "WILL_BE_OVERRIDDEN_BY_SEARXNG_SECRET_ENV"
      limiter: false
      image_proxy: true
      method: "GET"
      default_http_headers:
        X-Content-Type-Options: nosniff
        X-Download-Options: noopen
        X-Robots-Tag: noindex, nofollow
        Referrer-Policy: no-referrer
    ui:
      static_use_hash: true
      default_theme: simple
      theme_args:
        simple_style: dark
    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en"
      formats:
        - html
        - json
    enabled_plugins:
      - 'Hash plugin'
      - 'Self Information'
      - 'Tracker URL remover'
      - 'Ahmia blacklist'
      - 'Hostnames plugin'
      - 'Open Access DOI rewrite'
    outgoing:
      request_timeout: 6.0
      max_request_timeout: 10.0
      pool_connections: 100
      pool_maxsize: 20
      enable_http2: true
