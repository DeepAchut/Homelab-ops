# Template — copy to secrets.yaml, fill, encrypt as secret.enc.yaml, commit only the encrypted file.
#
# Generate the secret_key:  openssl rand -hex 32
#
# This value overrides the placeholder in configmap.yaml's settings.yml
# (SearXNG honors SEARXNG_SECRET env over the file-config value).
apiVersion: v1
kind: Secret
metadata:
  name: searxng-secret
  namespace: searxng
type: Opaque
stringData:
  SEARXNG_SECRET: "REPLACE_ME_32_HEX_CHARS"
