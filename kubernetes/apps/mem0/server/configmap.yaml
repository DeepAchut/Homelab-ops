apiVersion: v1
kind: ConfigMap
metadata:
  name: mem0-server-config
  namespace: mem0
data:
  config.yaml: |
    llm:
      provider: "ollama"
      config:
        model: "gemma4:e4b"
        ollama_base_url: "http://192.168.4.110:11434"
    embedder:
      provider: "ollama"
      config:
        model: "nomic-embed-text"
        ollama_base_url: "http://192.168.4.110:11434"
    vector_store:
      provider: "qdrant"
      config:
        host: "qdrant.mem0.svc.cluster.local"
        port: 6333
        collection_name: "mem0"
    version: "v1.1"
