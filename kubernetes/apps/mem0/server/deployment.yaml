apiVersion: apps/v1
kind: Deployment
metadata:
  name: mem0-server
  namespace: mem0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mem0-server
  template:
    metadata:
      labels:
        app: mem0-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: ira-rpi4-talos-worker
      containers:
        - name: mem0-server
          image: deepkchhaiya/mem0-server:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MEM0_CONFIG_PATH
              value: /app/config/config.yaml
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: DATABASE_URL
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: mem0-server-config
