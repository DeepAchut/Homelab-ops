apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: mem0
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
      annotations:
        # Scraped by the monitoring vmagent's kubernetes-pods job -> VictoriaMetrics.
        # qdrant exposes Prometheus metrics on the REST port (:6333/metrics):
        # collections_total, collections_vector_total, rest_responses_total/fail/avg_duration.
        # Powers the mem0 Grafana dashboard (vector counts, growth, API health).
        prometheus.io/scrape: "true"
        prometheus.io/port: "6333"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: ira-rpi4-talos-worker
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.4
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: qdrant-data
