# OpenMemory's OWN qdrant — isolated from the working mem0 qdrant (parallel deploy).
# Pinned to evo-x2 (amd64, resource-rich).
#
# IMPORTANT (image quirk): OpenMemory's utils/memory.py hardcodes the vector_store
# host to "mem0_store" (the upstream docker-compose service name) and never reads
# QDRANT_HOST. So we expose this qdrant under a Service named `mem0_store` below.
# It also omits embedding_model_dims, so mem0 would default the collection to 1536;
# our embedder (qwen3-embedding:0.6b) is 1024. The openmemory-collection-init Job
# (see collection-init.yaml) pre-creates the "openmemory" collection at 1024 dims
# so mem0 reuses it instead of creating a 1536 one.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openmemory-qdrant-data
  namespace: openmemory
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openmemory-qdrant
  namespace: openmemory
spec:
  serviceName: openmemory-qdrant
  replicas: 1
  selector:
    matchLabels: { app: openmemory-qdrant }
  template:
    metadata:
      labels: { app: openmemory-qdrant }
    spec:
      nodeSelector:
        tier: ai-worker
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.4
          ports:
            - { containerPort: 6333, name: http }
            - { containerPort: 6334, name: grpc }
          volumeMounts:
            - { name: data, mountPath: /qdrant/storage }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /readyz, port: 6333 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: openmemory-qdrant-data }
---
apiVersion: v1
kind: Service
metadata:
  name: openmemory-qdrant
  namespace: openmemory
spec:
  selector: { app: openmemory-qdrant }
  ports:
    - { port: 6333, targetPort: 6333, name: http }
    - { port: 6334, targetPort: 6334, name: grpc }
  clusterIP: None
---
# Stable ClusterIP for qdrant. The API image hardcodes the qdrant host as the
# invalid-in-k8s name "mem0_store" (underscore), so we can't name a Service that.
# Instead the api Deployment maps mem0_store -> this pinned ClusterIP via
# hostAliases. clusterIP is pinned so the /etc/hosts entry stays valid across
# restarts. (If you ever recreate this Service and k8s assigns a different IP,
# update the hostAliases IP in api.yaml to match.)
apiVersion: v1
kind: Service
metadata:
  name: openmemory-qdrant-cl
  namespace: openmemory
  labels: { app: openmemory-qdrant }
spec:
  type: ClusterIP
  clusterIP: 10.108.209.110
  selector: { app: openmemory-qdrant }
  ports:
    - { port: 6333, targetPort: 6333, name: http }
    - { port: 6334, targetPort: 6334, name: grpc }
