# OpenMemory dashboard (Next.js). Points at the API's NodePort so the browser
# (on the LAN) and the in-cluster API agree on the URL. NEXT_PUBLIC_* are baked
# at request time by this image, so the API URL must be LAN-reachable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmemory-ui
  namespace: openmemory
  labels: { app: openmemory-ui }
spec:
  replicas: 1
  selector:
    matchLabels: { app: openmemory-ui }
  template:
    metadata:
      labels: { app: openmemory-ui }
    spec:
      nodeSelector:
        tier: ai-worker
      containers:
        - name: ui
          image: mem0/openmemory-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 3000, name: http }
          env:
            # The browser calls the API via this URL — must be LAN-reachable
            # (NodePort on any node IP). Using the evo-x2 worker IP.
            - { name: NEXT_PUBLIC_API_URL, value: "http://192.168.4.71:30765" }
            - { name: NEXT_PUBLIC_USER_ID, value: "deep" }
          resources:
            requests: { cpu: "50m",  memory: "128Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: openmemory-ui
  namespace: openmemory
  labels: { app: openmemory-ui }
spec:
  type: NodePort
  selector: { app: openmemory-ui }
  ports:
    - { port: 3000, targetPort: 3000, nodePort: 30300, name: http }
