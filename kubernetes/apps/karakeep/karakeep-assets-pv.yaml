apiVersion: v1
kind: PersistentVolume
metadata:
  name: karakeep-assets
  labels:
    app: karakeep
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-pvedas-karakeep
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=2
  nfs:
    server: 192.168.4.150
    path: /mnt/pvedas/karakeep/assets
