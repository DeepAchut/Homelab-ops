apiVersion: batch/v1
kind: CronJob
metadata:
  name: miniflux-sync
  namespace: karakeep
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: python:3.13-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  pip install --quiet --no-cache-dir requests
                  python /scripts/miniflux_to_karakeep.py
              env:
                - name: MINIFLUX_URL
                  value: "http://miniflux.miniflux.svc.cluster.local:8080"
                - name: KARAKEEP_URL
                  value: "http://karakeep.karakeep.svc.cluster.local:3000"
                - name: MINIFLUX_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: karakeep-sync-creds
                      key: MINIFLUX_TOKEN
                - name: KARAKEEP_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: karakeep-sync-creds
                      key: KARAKEEP_TOKEN
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: script
              configMap:
                name: miniflux-sync-script
                defaultMode: 0555
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: miniflux-sync-script
  namespace: karakeep
data:
  miniflux_to_karakeep.py: |
    #!/usr/bin/env python3
    """
    Poll Miniflux for starred entries and push them as bookmarks into Karakeep.
    Karakeep dedupes by URL automatically, so re-running this is safe.
    """
    import os
    import sys
    import requests

    MINIFLUX_URL   = os.environ["MINIFLUX_URL"].rstrip("/")
    MINIFLUX_TOKEN = os.environ["MINIFLUX_TOKEN"]
    KARAKEEP_URL   = os.environ["KARAKEEP_URL"].rstrip("/")
    KARAKEEP_TOKEN = os.environ["KARAKEEP_TOKEN"]

    POLL_LIMIT = 50
    REQ_TIMEOUT = 30

    def fetch_starred():
        r = requests.get(
            f"{MINIFLUX_URL}/v1/entries",
            headers={"X-Auth-Token": MINIFLUX_TOKEN},
            params={
                "starred": "true",
                "order": "changed_at",
                "direction": "desc",
                "limit": POLL_LIMIT,
            },
            timeout=REQ_TIMEOUT,
        )
        r.raise_for_status()
        return r.json().get("entries", []) or []

    def push_to_karakeep(url, title):
        r = requests.post(
            f"{KARAKEEP_URL}/api/v1/bookmarks",
            headers={
                "Authorization": f"Bearer {KARAKEEP_TOKEN}",
                "Content-Type": "application/json",
            },
            json={"type": "link", "url": url, "title": title or url},
            timeout=REQ_TIMEOUT,
        )
        return r

    def main():
        entries = fetch_starred()
        if not entries:
            print("[miniflux-sync] no starred entries; nothing to do")
            return 0

        created = 0
        deduped = 0
        errors = []

        for e in entries:
            url = e.get("url")
            if not url:
                continue
            title = e.get("title") or url
            try:
                r = push_to_karakeep(url, title)
                if r.status_code in (200, 201):
                    created += 1
                elif r.status_code in (409, 422) or "already exists" in r.text.lower():
                    deduped += 1
                else:
                    errors.append(f"  {r.status_code} {url}: {r.text[:200]}")
            except Exception as ex:
                errors.append(f"  EXC {url}: {ex}")

        print(
            f"[miniflux-sync] starred={len(entries)} "
            f"created={created} deduped={deduped} errors={len(errors)}"
        )
        for line in errors[:5]:
            print(line)

        return 0 if not errors else (1 if len(errors) == len(entries) else 0)

    if __name__ == "__main__":
        sys.exit(main())
