# Template — DO NOT commit with real values. Copy to secrets.yaml, fill in,
# encrypt with `sops --encrypt --in-place secret.enc.yaml`, then commit
# secret.enc.yaml only.
#
# Generate values:
#   NEXTAUTH_SECRET:   openssl rand -hex 32
#   MEILI_MASTER_KEY:  openssl rand -hex 32
#   POSTGRES_PASSWORD: openssl rand -base64 24   (avoid /, +, = if pasting into URL)
#
# DATABASE_URL embeds the Postgres password and points at the headless
# StatefulSet service. Replace <POSTGRES_PASSWORD> below with the same value
# you put in karakeep-postgres-creds.

apiVersion: v1
kind: Secret
metadata:
  name: karakeep-app-creds
  namespace: karakeep
type: Opaque
stringData:
  NEXTAUTH_SECRET: "REPLACE_ME_32_HEX_CHARS"
  DATABASE_URL: "postgresql://karakeep:REPLACE_ME_POSTGRES_PASSWORD@postgres.karakeep.svc.cluster.local:5432/karakeep"
---
apiVersion: v1
kind: Secret
metadata:
  name: karakeep-postgres-creds
  namespace: karakeep
type: Opaque
stringData:
  POSTGRES_USER: karakeep
  POSTGRES_PASSWORD: "REPLACE_ME_POSTGRES_PASSWORD"
  POSTGRES_DB: karakeep
---
apiVersion: v1
kind: Secret
metadata:
  name: karakeep-meili-creds
  namespace: karakeep
type: Opaque
stringData:
  MEILI_MASTER_KEY: "REPLACE_ME_32_HEX_CHARS"
