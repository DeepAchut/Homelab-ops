apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
spec:
  type: NodePort   # exposed on every node IP — NPM (on CT203) can reach this
  selector:
    app: open-webui
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30880   # fixed so NPM mapping doesn't drift on reapply (valid range: 30000-32767)
