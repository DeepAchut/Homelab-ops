apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy-logs
  namespace: monitoring
spec:
  replicas: 1                      # API-based log tailing — single instance, no duplication
  selector:
    matchLabels:
      app: alloy-logs
  template:
    metadata:
      labels:
        app: alloy-logs
    spec:
      serviceAccountName: alloy-logs
      nodeSelector:
        kubernetes.io/hostname: ira-rpi4-talos-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          image: grafana/alloy:v1.16.1
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/tmp/alloy
            - /etc/alloy/config.alloy
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /tmp/alloy
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: alloy-logs-config
        - name: data
          emptyDir: {}
