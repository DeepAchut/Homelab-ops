#
# creation_rules are evaluated top-down — first match wins.
# Keep more specific rules above the catch-all so intent is documented per app.
creation_rules:
  # Hermes Agent skill content — topology-leaking SKILL.md kept private.
  # Files: apps/hermes-agent/skills/*/skill-content.enc.yaml
  - path_regex: "apps/hermes-agent/skills/.*\\.enc\\.yaml$"
    age: "age19gqzu544u299sfdfnsrxxgz6dw7vl7rk8p50mazkhvdwffwlf3msdr4q0t"
    encrypted_regex: "^(data|stringData)$"

  # Default — any other .enc.yaml in the kubernetes/ tree (app credentials, etc.)
  - path_regex: ".*\\.enc\\.yaml$"
    age: "age19gqzu544u299sfdfnsrxxgz6dw7vl7rk8p50mazkhvdwffwlf3msdr4q0t"
    encrypted_regex: "^(data|stringData)$"

  # .enc files encryption rules for non-Kubernetes files (e.g., .env.enc.yaml, .envrc.enc.yaml, etc.)
  # 1. Catch files ending in .env, .env.enc, or .env.yaml
  - path_regex: \.env(\..+)?$
    # 2. Tell SOPS to parse key=value lines instead of standard YAML
    input_type: dotenv
    output_type: dotenv
    # 3. Restrict your plaintext exclusions to ONLY your preferred keys
    unencrypted_regex: "^(PORT|NODE_ENV)$"
    # 4. Provide your Age public key here
    age: "age19gqzu544u299sfdfnsrxxgz6dw7vl7rk8p50mazkhvdwffwlf3msdr4q0t"
