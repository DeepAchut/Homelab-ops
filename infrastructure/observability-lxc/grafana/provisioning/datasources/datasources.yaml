apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    uid: victoriametrics
    url: http://victoriametrics:8428
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "30s"

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
