# External-drive mounts for the Peladn host — append these lines to /etc/fstab.
# (Filesystem UUIDs are stable identities; USB /dev/sdX letters are NOT — they
#  shuffle on reboot, so ALWAYS mount by UUID here and reference by mountpoint
#  everywhere else, e.g. Beszel's EXTRA_FILESYSTEMS in beszel-agent.service.)
#
# Get a drive's UUID with:  lsblk -o NAME,SIZE,FSTYPE,UUID,MOUNTPOINT,SERIAL,MODEL
#
# nofail                     -> a missing/late USB drive never blocks boot
# x-systemd.device-timeout   -> cap how long boot waits for the device
#
# 2TB Seagate "BUP Slim SL" (serial NA9J07E1)
UUID=4d0eafbb-09dc-4717-b619-c6acf2a75a5a  /mnt/sg-ext-hdd  ext4  defaults,nofail,x-systemd.device-timeout=10  0 2

# 2TB WD WD20SDRW (serial WD-WXC2A70HZS26)
UUID=f55393ac-43bb-417e-8a56-709c51f65904  /mnt/wd-ext-hdd  ext4  defaults,nofail,x-systemd.device-timeout=10  0 2

# 10.9TB Toshiba DAS (serial 55T0A08FF1HJ) — the /mnt/pvedas backup datastore.
#
# IMPORTANT: this is a PLAIN mount. Do NOT re-add `x-systemd.automount`.
# The automount registers /mnt/pvedas twice in /proc/mounts (an `autofs`/systemd-1
# entry + the real `/dev/sdd xfs`), which makes Beszel key on `systemd-1` and show
# capacity but NO disk-I/O throughput (Grafana/node-exporter are unaffected — they
# read /proc/diskstats per device). Removed 2026-07-21. Consequence: after a DAS
# flap, re-mounting relies solely on das-mount-watchdog (~2-min tick) instead of
# mount-on-access — acceptable since the USB-C->USB3 swap made the DAS stable.
# `nouuid` is required for XFS when the fs UUID also appears elsewhere.
UUID=cb8ce272-49dc-4cdb-9632-630e0d129322  /mnt/pvedas  xfs  defaults,nofail,nouuid,x-systemd.device-timeout=15  0 2
