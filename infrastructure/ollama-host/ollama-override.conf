# /etc/systemd/system/ollama.service.d/override.conf
#
# Drops in on top of the Ollama installer's default systemd unit on the Evo-X2 host.
# Tuned for AMD Strix Halo (Radeon 8060S, gfx1151) — Phase 22a, 2026-05-26.
#
# After editing: `systemctl daemon-reload && systemctl restart ollama`
[Service]

# Listen on LAN (firewalled by /etc/nftables.d/ollama.conf — LAN-only)
Environment="OLLAMA_HOST=0.0.0.0"

# Tell HIP runtime to use gfx1150 kernels on the gfx1151 chip — most reliable detection path
Environment="HSA_OVERRIDE_GFX_VERSION=11.5.0"

# Disable SDMA — Strix Halo stability hint per AMD ROCm working guide
Environment="HSA_ENABLE_SDMA=0"

# Performance + capacity
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"
Environment="OLLAMA_MAX_LOADED_MODELS=2"
Environment="OLLAMA_NUM_PARALLEL=2"

# Default context window. Ollama otherwise truncates every prompt to ~4K, which
# breaks agentic coding tools (Cline/Roo/Continue in VS Code) — they send large
# multi-file prompts. qwen3.6 supports 256K; 32K is a good local balance (agent
# has room, prompt-eval stays fast). Cheap here thanks to q8_0 KV cache + flash
# attn on 71 GiB VRAM. Raise to 65536 if you want bigger repo context.
Environment="OLLAMA_CONTEXT_LENGTH=32768"

# Keep models resident for snappy responses — pin -1 (forever) or a duration like 24h
Environment="OLLAMA_KEEP_ALIVE=24h"
