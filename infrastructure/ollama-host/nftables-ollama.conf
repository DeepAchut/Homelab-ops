# /etc/nftables.d/ollama.conf  — additive, LAN-only access to Ollama
#
# Drops on top of the Proxmox host's existing (empty) nftables ruleset.
# Doesn't touch other ports — only adds rules for tcp/11434.
#
# Apply:  nft -f /etc/nftables.d/ollama.conf
# Persist: add `include "/etc/nftables.d/ollama.conf"` to /etc/nftables.conf
#          systemctl enable --now nftables
#
# Verify: nft list table inet ollama_fw

table inet ollama_fw {
  chain input {
    type filter hook input priority -10; policy accept;
    iifname "lo" accept
    # allow Ollama from LAN
    tcp dport 11434 ip saddr 192.168.4.0/24 accept
    # drop Ollama from everything else (Internet, weird VLANs, etc.)
    tcp dport 11434 drop
  }
}
