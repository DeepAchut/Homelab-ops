  #     - /mnt/das/nextcloud/data:/var/www/html/data
  #     - /mnt/das/nextcloud/external_locaions/tmpfs:/tmpfs
  #     - /mnt/das/nextcloud/external_locaions/Non-Raid-1:/var/SG_NonRaid
  #     - /mnt/das/nextcloud/external_locaions/Non-Raid-2:/var/WD_NonRaid
  #     - /mnt/das/nextcloud/external_locaions/Raid-Shared:/var/Raid
  #     - /tmp:/tmp:exec
  #     - /mnt/sg-ext-hdd:/var/sg-ext-hdd
  #     - /mnt/wd-ext-hdd:/var/wd-ext-hdd
  #   environment:
  #     - MYSQL_HOST=mariadb
  #     - MYSQL_DATABASE=nextcloud
  #     - MYSQL_USER=${NC_DB_USER}
  #     - MYSQL_PASSWORD=${NC_DB_PASSWORD}
  #     - REDIS_HOST=nextcloud-redis
  #     - REDIS_PORT=6379
  #     - PHP_MEMORY_LIMIT=2G  # match main nextcloud service; default 512M OOMs on thumbnails
  #   depends_on:
  #     - nextcloud
  #     - mariadb
  #     - nextcloud-redis
  #   networks:
  #     - nextcloud-net
  #   restart: unless-stopped

  # ============================================================
  # MEDIA PLAYER (Jellyfin)
  # ============================================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "1000:1000"
    group_add:
      - "44"   # video
      - "992"  # render
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/jellyfin/config:/config
      - /mnt/das/jellyfin/cache:/cache
      - /mnt/sg-ext-hdd/Entertainment/Movies:/media/movies
      - /mnt/sg-ext-hdd/Entertainment/tvshows:/media/shows
      - /mnt/sg-ext-hdd/Entertainment/songs:/media/songs
    ports:
      - "8096:8096"
    environment:
      - TZ=America/Chicago
    restart: unless-stopped

  # ============================================================
  # NVR (Frigate) — REMOVED in Phase 13
  # Replaced by native Reolink integration + HA automations
  # ============================================================
  # frigate:
  #   image: ghcr.io/blakeblackshear/frigate:stable
  #   container_name: frigate
  #   shm_size: "256mb"
  #   devices:
  #     - /dev/dri:/dev/dri
  #   volumes:
  #     - /mnt/das/frigate/config:/config
  #     - /mnt/das/frigate/media:/media/frigate
