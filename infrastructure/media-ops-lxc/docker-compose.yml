networks:
  immich-net:
  nextcloud-net:

services:
  # Grafana Alloy — ships this LXC's Docker container logs to central Loki on CT405.
  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/alloy:/var/lib/alloy
    ports:
      - "12345:12345"  # Alloy UI (debug)

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  # ============================================================
  # PHOTO MANAGEMENT (Immich)
  # ============================================================
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.1
    container_name: immich-server
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - /mnt/das/nextcloud/external_locaions/Raid-Shared/shared/shared_photos:/usr/src/app/external/deepkhush_photos
      - /mnt/das/nextcloud/external_locaions/Raid-Shared/shared/deep/Deepkhush Photos:/usr/src/app/external/shared_photos
    env_file:
      - .env
    ports:
      - "2283:2283"
    depends_on:
      - immich-db
      - immich-redis
    networks:
      - immich-net
      - default
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.1-openvino
    container_name: immich-ml
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/immich/model-cache:/cache
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    networks:
      - immich-net
    restart: unless-stopped

  immich-db:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    container_name: immich-db
    volumes:
      - /var/lib/immich-db:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - immich-net
    restart: unless-stopped

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    networks:
      - immich-net
    restart: unless-stopped

  # ============================================================
  # PRIVATE CLOUD (Nextcloud)
  # ============================================================
  # IMAGE PIN HISTORY:
  #   - Was `nextcloud:stable` (moving tag) — caused April 2026 maintenance-mode
  #     lock-up: container restarted, pulled newer minor version, mid-upgrade
  #     migration was interrupted, oc_appconfig was left half-built, Nextcloud
  #     wedged into HTTP 500 / maintenance mode (see Phase-27-nextcloud-recovery.md).
  #   - Now pinned to a specific version below. Bump deliberately by editing
  #     this tag + running `docker compose up -d nextcloud` and watching
  #     `docker logs -f nextcloud` for upgrade completion BEFORE walking away.
  #     The recovery script (nextcloud-recover.sh in this dir) prints the
  #     exact tag to pin based on the currently-running container — run it
  #     once after any upgrade to capture the verified version.
  nextcloud:
    image: nextcloud:30.0.13-apache  # ← pin; see history note above
    container_name: nextcloud
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /var/www/nextcloud/:/var/www/html
      - /var/www/nextcloud/custom_apps:/var/www/html/custom_apps
      - /var/www/nextcloud/config:/var/www/html/config
      - /mnt/das/nextcloud/data:/var/www/html/data
      - /mnt/das/nextcloud/external_locaions/tmpfs:/tmpfs
      - /mnt/das/nextcloud/external_locaions/Non-Raid-1:/var/SG_NonRaid
      - /mnt/das/nextcloud/external_locaions/Non-Raid-2:/var/WD_NonRaid
      - /mnt/das/nextcloud/external_locaions/Raid-Shared:/var/Raid
      - /tmp:/tmp:exec
      - /mnt/sg-ext-hdd:/var/sg-ext-hdd
      - /mnt/wd-ext-hdd:/var/wd-ext-hdd
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=${NC_DB_USER}
      - MYSQL_PASSWORD=${NC_DB_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NC_TRUSTED_DOMAINS}
      - OVERWRITECLIURL=${NC_OVERWRITE_URL}
      - OVERWRITEHOST=${NC_OVERWRITE_HOST}
      - OVERWRITEPROTOCOL=https
      - PHP_MEMORY_LIMIT=2G
      - PHP_UPLOAD_LIMIT=100G
      - APACHE_BODY_LIMIT=0
      - REDIS_HOST=nextcloud-redis
      - REDIS_PORT=6379
    ports:
      - "8080:80"
    # Wait for DB + Redis to be HEALTHY (not just started). If we just say
    # "depends_on mariadb", the entrypoint can race the DB init on a cold
    # boot — Nextcloud sees a partially-ready DB, panics, and that's how
    # we ended up with half-built oc_appconfig.
    depends_on:
      mariadb:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    networks:
      - nextcloud-net
      - default
    restart: unless-stopped
    healthcheck:
      # status.php returns JSON with "maintenance":false when healthy.
      # If maintenance is stuck on, container is marked unhealthy — surfaces
      # in `docker ps` immediately instead of silently 500ing for hours.
      test: ["CMD-SHELL", "curl -fsS http://localhost/status.php | grep -q '\"maintenance\":false' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s  # let occ upgrade finish on first start of new image

  mariadb:
    # Pinned (was linuxserver/mariadb:latest — same auto-bump risk as nextcloud).
    # 11.4 is current LTS; bump deliberately when planning a major-version move.
    image: linuxserver/mariadb:11.4.7
    container_name: mariadb
    volumes:
      - /var/lib/nextcloud-db:/config
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=${NC_DB_USER}
      - MYSQL_PASSWORD=${NC_DB_PASSWORD}
      - TZ=America/Chicago
    networks:
      - nextcloud-net
    restart: unless-stopped
    healthcheck:
      # mysqladmin ping is the canonical readiness probe for MariaDB.
      # Used by Nextcloud's depends_on above so it can't race a half-started DB.
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    networks:
      - nextcloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Disabled 2026-05-30: switched Nextcloud to AJAX cron mode (`php occ background:ajax`).
  # User opens Nextcloud a few times a week — running cron every 5 min generated
  # constant CPU/iowait/temp spikes on Peladn for no benefit. AJAX mode runs
  # background jobs piggybacked on page loads, which matches the actual usage.
  # Re-enable this block (and revert to `background:cron` via occ) if you ever
  # add federated shares, calendar sharing, or other features that need
  # background work to happen while no one is logged in.
  # nextcloud-cron:
  #   image: nextcloud:stable
  #   container_name: nextcloud-cron
  #   entrypoint: /cron.sh
  #   volumes:
  #     - /var/www/nextcloud/:/var/www/html
  #     - /var/www/nextcloud/custom_apps:/var/www/html/custom_apps
  #     - /var/www/nextcloud/config:/var/www/html/config
  #     - /mnt/das/nextcloud/data:/var/www/html/data
  #     - /mnt/das/nextcloud/external_locaions/tmpfs:/tmpfs
  #     - /mnt/das/nextcloud/external_locaions/Non-Raid-1:/var/SG_NonRaid
  #     - /mnt/das/nextcloud/external_locaions/Non-Raid-2:/var/WD_NonRaid
  #     - /mnt/das/nextcloud/external_locaions/Raid-Shared:/var/Raid
  #     - /tmp:/tmp:exec
  #     - /mnt/sg-ext-hdd:/var/sg-ext-hdd
  #     - /mnt/wd-ext-hdd:/var/wd-ext-hdd
  #   environment:
  #     - MYSQL_HOST=mariadb
  #     - MYSQL_DATABASE=nextcloud
  #     - MYSQL_USER=${NC_DB_USER}
  #     - MYSQL_PASSWORD=${NC_DB_PASSWORD}
  #     - REDIS_HOST=nextcloud-redis
  #     - REDIS_PORT=6379
  #     - PHP_MEMORY_LIMIT=2G  # match main nextcloud service; default 512M OOMs on thumbnails
  #   depends_on:
  #     - nextcloud
  #     - mariadb
  #     - nextcloud-redis
  #   networks:
  #     - nextcloud-net
  #   restart: unless-stopped

  # ============================================================
  # MEDIA PLAYER (Jellyfin)
  # ============================================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "1000:1000"
    group_add:
      - "44"   # video
      - "992"  # render
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/jellyfin/config:/config
      - /mnt/das/jellyfin/cache:/cache
      - /mnt/sg-ext-hdd/Entertainment/Movies:/media/movies
      - /mnt/sg-ext-hdd/Entertainment/tvshows:/media/shows
      - /mnt/sg-ext-hdd/Entertainment/songs:/media/songs
    ports:
      - "8096:8096"
    environment:
      - TZ=America/Chicago
    restart: unless-stopped

  # ============================================================
  # NVR (Frigate) — REMOVED in Phase 13
  # Replaced by native Reolink integration + HA automations
  # ============================================================
