networks:
  immich-net:
  nextcloud-net:

services:
  # ============================================================
  # PHOTO MANAGEMENT (Immich)
  # ============================================================
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.1
    container_name: immich-server
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - /mnt/das/nextcloud/external_locations/Raid-Shared/shared/shared_photos:/usr/src/app/external/deepkhush_photos
      - /mnt/das/nextcloud/external_locations/Raid-Shared/shared/deep/Deepkhush Photos:/usr/src/app/external/shared_photos
    env_file:
      - .env
    ports:
      - "2283:2283"
    depends_on:
      - immich-db
      - immich-redis
    networks:
      - immich-net
      - default
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.1-openvino
    container_name: immich-ml
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/immich/model-cache:/cache
    env_file:
      - .env
    networks:
      - immich-net
    restart: unless-stopped

  immich-db:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    container_name: immich-db
    volumes:
      - /var/lib/immich-db:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - immich-net
    restart: unless-stopped

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    networks:
      - immich-net
    restart: unless-stopped

  # ============================================================
  # PRIVATE CLOUD (Nextcloud)
  # ============================================================
  nextcloud:
    image: nextcloud:stable
    container_name: nextcloud
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /var/www/nextcloud/:/var/www/html
      - /var/www/nextcloud/custom_apps:/var/www/html/custom_apps
      - /var/www/nextcloud/config:/var/www/html/config
      - /mnt/das/nextcloud/data:/var/www/html/data
      - /mnt/das/nextcloud/external_locaions/tmpfs:/tmpfs
      - /mnt/das/nextcloud/external_locaions/Non-Raid-1:/var/SG_NonRaid
      - /mnt/das/nextcloud/external_locaions/Non-Raid-2:/var/WD_NonRaid
      - /mnt/das/nextcloud/external_locaions/Raid-Shared:/var/Raid
      - /tmp:/tmp:exec
      - /mnt/sg-ext-hdd:/var/sg-ext-hdd
      - /mnt/wd-ext-hdd:/var/wd-ext-hdd
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=${NC_DB_USER}
      - MYSQL_PASSWORD=${NC_DB_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NC_TRUSTED_DOMAINS}
      - OVERWRITECLIURL=${NC_OVERWRITE_URL}
      - OVERWRITEHOST=${NC_OVERWRITE_HOST}
      - OVERWRITEPROTOCOL=https
      - PHP_MEMORY_LIMIT=2G
      - PHP_UPLOAD_LIMIT=100G
      - REDIS_HOST=nextcloud-redis
      - REDIS_PORT=6379
    ports:
      - "8080:80"
    depends_on:
      - mariadb
      - nextcloud-redis
    networks:
      - nextcloud-net
      - default
    restart: unless-stopped

  mariadb:
    image: linuxserver/mariadb:latest
    container_name: mariadb
    volumes:
      - /var/lib/nextcloud-db:/config
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=${NC_DB_USER}
      - MYSQL_PASSWORD=${NC_DB_PASSWORD}
      - TZ=America/Chicago
    networks:
      - nextcloud-net
    restart: unless-stopped

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    networks:
      - nextcloud-net
    restart: unless-stopped

  # ============================================================
  # MEDIA PLAYER (Jellyfin)
  # ============================================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "1000:1000"
    group_add:
      - "44"   # video
      - "992"  # render
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/jellyfin/config:/config
      - /mnt/das/jellyfin/cache:/cache
      - /mnt/sg-ext-hdd/Entertainment/Movies:/media/movies
      - /mnt/sg-ext-hdd/Entertainment/tvshows:/media/shows
      - /mnt/sg-ext-hdd/Entertainment/songs:/media/songs
    ports:
      - "8096:8096"
    environment:
      - TZ=America/Chicago
    restart: unless-stopped

  # ============================================================
  # NVR (Frigate)
  # ============================================================
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    shm_size: "256mb"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/das/frigate/config:/config
      - /mnt/das/frigate/media:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
      - "8971:8971"
    environment:
      - TZ=America/Chicago
      - GO2RTC_ALLOW_ARBITRARY_EXEC=true
      - OMP_NUM_THREADS=8
    restart: unless-stopped

  # ============================================================
  # PRIVATE BROWSER DESKTOP (Webtop)
  # ============================================================
  webtop:
    image: lscr.io/linuxserver/webtop:latest
    container_name: webtop
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - CUSTOM_USER=${WEBTOP_USER}
      - PASSWORD=${WEBTOP_PASSWORD}
    volumes:
      - /mnt/wd-ext-hdd/webtop/config:/config
      - /mnt/wd-ext-hdd/webtop/downloads:/config/Downloads
    ports:
      - "3000:3000"
      - "3001:3001"
    shm_size: "1gb"
    restart: unless-stopped