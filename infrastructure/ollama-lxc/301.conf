arch: amd64
cores: 12
features: nesting=1,systemd=1
hostname: ollama-lxc
memory: 12288
mp0: ollama-storage:301/vm-301-disk-0.raw,mp=/mnt/ollama-data,backup=1,size=500G
net0: name=eth0,bridge=vmbr0,firewall=1,hwaddr=BC:24:11:D3:C6:5B,ip=dhcp,ip6=dhcp,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-301-disk-0,size=150G
startup: order=1
swap: 2048
unprivileged: 1

# NVIDIA GPU pass-in
# Major device numbers verified on host via: cat /proc/devices | grep -i nvidia
# 195 = nvidia, 236 = nvidia-uvm, 243 = nvidia-caps — confirm these match your host
lxc.cgroup2.devices.allow: c 195:* rwm
lxc.cgroup2.devices.allow: c 236:* rwm
lxc.cgroup2.devices.allow: c 243:* rwm
lxc.mount.entry: /dev/nvidia0 dev/nvidia0 none bind,optional,create=file
lxc.mount.entry: /dev/nvidiactl dev/nvidiactl none bind,optional,create=file
lxc.mount.entry: /dev/nvidia-uvm dev/nvidia-uvm none bind,optional,create=file
lxc.mount.entry: /dev/nvidia-uvm-tools dev/nvidia-uvm-tools none bind,optional,create=file
lxc.mount.entry: /dev/nvidia-caps dev/nvidia-caps none bind,optional,create=dir
