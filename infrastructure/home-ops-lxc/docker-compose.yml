services:
  # Grafana Alloy — ships this LXC's Docker container logs to central Loki on CT405.
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/alloy:/var/lib/alloy
    ports:
      - "12345:12345"  # Alloy UI (debug)

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    volumes:
      - /var/lib/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /mnt/wd-ext-hdd/homeassistant:/config/www/wd-ext-hdd  # Camera recordings (Phase 13)
      - /mnt/sg-ext-hdd/homeassistant/backups:/config/backups      # HA backups on sg-ext HDD
      - /mnt/sg-ext-hdd/homeassistant/tmp_backups:/config/tmp_backups  # Temp workspace during backup creation
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0  # Uncomment when Zigbee/Matter USB stick is plugged in
    environment:
      - TZ=America/Chicago
    restart: unless-stopped

  gotify:
    image: gotify/server:2.9.1
    container_name: gotify
    environment:
      - TZ=America/Chicago
      - GOTIFY_SERVER_PORT=80
      # Default user envs are ignored once the DB has an admin (old creds: admin/custom).
      # Kept here only so a fresh install wouldn't silently use defaults.
      - GOTIFY_DEFAULTUSER_NAME=admin
      - GOTIFY_DEFAULTUSER_PASS=custom
    volumes:
      - /mnt/das/gotify/data:/app/data
    ports:
      - "8800:80"
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    volumes:
      - /var/lib/npm/data:/data
      - /var/lib/npm/etc/letsencrypt:/etc/letsencrypt
      - /var/lib/npm/default_site:/app/npm-logs
      - /var/lib/npm/default_site:/default_site
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    restart: unless-stopped

  # wireguard:
  #   image: ghcr.io/wg-easy/wg-easy:latest
  #   container_name: wireguard
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
  #   sysctls:
  #     - net.ipv4.ip_forward=1
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   volumes:
  #     - /mnt/das/wireguard/config:/etc/wireguard
  #   ports:
  #     - "51820:51820/udp"
  #     - "51821:51821/tcp"
  #   environment:
  #     - WG_HOST=${WG_HOST}
  #     - PASSWORD_HASH=${WG_PASSWORD_HASH}
  #     - WG_DEFAULT_DNS=${WG_DNS}
  #     - WG_PORT=51820
  #   env_file:
  #     - .env
  #   restart: unless-stopped

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    volumes:
      - /var/lib/vaultwarden/data:/data
    ports:
      - "8443:80"
    environment:
      - TZ=America/Chicago
      - ADMIN_TOKEN=${VW_ADMIN_TOKEN}
    restart: unless-stopped

  upsnap:
    image: ghcr.io/seriousm4x/upsnap:latest
    container_name: upsnap
    network_mode: host
    environment:
      - TZ=America/Chicago
      - UPSNAP_INTERVAL=@every 10s
      - UPSNAP_SCAN_RANGE=192.168.4.0/24
    volumes:
      - /var/lib/upsnap/data:/app/pb_data
    restart: unless-stopped

  obsidian-livesync:
    image: couchdb:3.5.2
    container_name: obsidian-livesync
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
      - PGID=33
      - PUID=33
      - TZ=America/Chicago
    ports:
      - "5984:5984"
    volumes:
      - /var/lib/obsidian-livesync:/opt/couchdb/data
      - /var/lib/obsidian-livesync/etc/local.ini:/opt/couchdb/etc/local.ini
    restart: unless-stopped

  # ============================================================
  # IMAGE-UPDATE MONITOR (What's Up Docker)
  # ============================================================
  # Watches every local container for newer image tags/digests and exposes an
  # API (/api/containers) that the Homepage dashboard's "whatsupdocker" widget
  # reads. Host port 3003 -> container 3000. Socket mounted read-only.
  wud:
    image: getwud/wud:latest
    container_name: wud
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3003:3000"
    environment:
      - TZ=America/Chicago
      - WUD_WATCHER_LOCAL_WATCHBYDEFAULT=true
    restart: unless-stopped