services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    volumes:
      - /var/lib/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0  # Uncomment when Zigbee/Matter USB stick is plugged in
    environment:
      - TZ=America/Chicago
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    volumes:
      - /var/lib/mosquitto/config:/mosquitto/config
      - /var/lib/mosquitto/data:/mosquitto/data
      - /var/lib/mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    volumes:
      - /var/lib/npm/data:/data
      - /var/lib/npm/etc/letsencrypt:/etc/letsencrypt
      - /var/lib/npm/default_site:/app/npm-logs
      - /var/lib/npm/default_site:/default_site
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    restart: unless-stopped

  # wireguard:
  #   image: ghcr.io/wg-easy/wg-easy:latest
  #   container_name: wireguard
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
