  #     - PASSWORD_HASH=${WG_PASSWORD_HASH}
  #     - WG_DEFAULT_DNS=${WG_DNS}
  #     - WG_PORT=51820
  #   env_file:
  #     - .env
  #   restart: unless-stopped

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    volumes:
      - /var/lib/vaultwarden/data:/data
    ports:
      - "8443:80"
    environment:
      - TZ=America/Chicago
      - ADMIN_TOKEN=${VW_ADMIN_TOKEN}
    restart: unless-stopped

  upsnap:
    image: ghcr.io/seriousm4x/upsnap:latest
    container_name: upsnap
    network_mode: host
    environment:
      - TZ=America/Chicago
      - UPSNAP_INTERVAL=@every 10s
      - UPSNAP_SCAN_RANGE=192.168.4.0/24
    volumes:
      - /var/lib/upsnap/data:/app/pb_data
    restart: unless-stopped

  obsidian-livesync:
    image: couchdb:3.5.0
    container_name: obsidian-livesync
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
      - PGID=33
      - PUID=33
      - TZ=America/Chicago
    ports:
      - "5984:5984"
    volumes:
      - /var/lib/obsidian-livesync:/opt/couchdb/data
      - /var/lib/obsidian-livesync/etc/local.ini:/opt/couchdb/etc/local.ini
    restart: unless-stopped